{% extends "auth_base.html" %}
{% load static %}

{% block title %}
Change Password
{% endblock title %}

{% block content %}


<!-- ================= Form-Section ============================= -->
<div class="container my-2">
    <div class="row justify-content-center">
        <div class="col-4">
            <div class="form-container">
                <!-- cross-icon -->
                <a href="{% url 'index_page' %}" style="color: white;">
                    <i class="fa-solid fa-xmark cross"></i>
                </a>
                <p class="title">Change Password</p>
                <form class="form" method="POST" action="{% url 'change_password' %}">
                    {% csrf_token %}

                    {% for fm in form %}
                    <div class="input-group">

                        <label for="{{fm.id_for_label}}">{{fm.label}}</label>
                        <!-- {{fm.label}} -->
                        {{fm}}

                        {{fm.errors|striptags}}

                    </div>
                    {% endfor %}

                    <button class="sign mt-3">Change Password</button>
                </form>
            </div>
        </div>
    </div>
</div>
<!-- ================= Form-Section ============================= -->


{% endblock content %}
