<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Edit Profile</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            background: #121212;
            color: white;
        }

        .form-container {
            background: #1e1e1e;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }

        .form-control,
        .form-select {
            background: #2a2a2a;
            border: none;
            color: white;
        }

        .form-control:focus,
        .form-select:focus {
            background: #2a2a2a;
            color: white;
            box-shadow: none;
            border: 1px solid #ffc107;
        }

        .crossHo:hover {
            color: #ffcc00;
            transition: 0.3s;
        }
    </style>
</head>

<body>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">

                <div class="form-container p-4">

                    <!-- Back Button -->
                    <a href="{% url 'profile_page' %}" class="text-white mb-3 d-inline-block">
                        <i class="fa-solid fa-arrow-left fa-xl crossHo"></i>
                    </a>

                    <!-- Profile Header -->
                    <div class="text-center mb-4">
                        {% if pro.profile_pic %}
                        <div class="profile-avatar mb-3">
                            <img src="{{pro.profile_pic.url}}" alt=""
                                style="height: 100px; width: 100px; border-radius: 50px;">
                        </div>
                        {% else %}
                        <!-- Defualt -->
                        <div class="profile-avatar mb-3">
                            <i class="fa-solid fa-circle-user fa-5x text-secondary"></i>
                        </div>

                        {% endif %}


                    </div>



                    <h3 class="text-center mb-4">Edit Profile</h3>

                    <!-- Message ko lagi -->
                    {% if messages %}
                    {% for m in messages %}
                    {% if m.tags == "success" %}
                    <p id="hideMsg" class="text-center text-success fs-5">{{m}}</p>
                    {% else %}
                    <p id="hideMsg" class="text-center text-danger fs-5">{{m}}</p>
                    {% endif %}
                    {% endfor %}
                    {% endif %}
                    <!-- Message ko lagi -->

                    <!-- Form -->
                    <form method="POST" action="{% url 'edit_page' %}" enctype="multipart/form-data">
                        {% csrf_token %}

                        <!-- Full Name -->
                        <div class="mb-3">
                            <label class="form-label text-white-50">Full Name</label>
                            <input type="text" name="full_name" class="form-control" value="{{request.user.full_name}}"
                                required>
                        </div>

                        <!-- Username -->
                        <div class="mb-3">
                            <label class="form-label text-white-50">Username</label>
                            <input type="text" name="username" class="form-control" value="{{request.user.username}}"
                                required>
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label class="form-label text-white-50">Email Address</label>
                            <input type="email" name="email" class="form-control" value="{{request.user.email}}"
                                required>
                        </div>

                        <!-- Phone -->
                        <div class="mb-3">
                            <label class="form-label text-white-50">Phone Number</label>
                            <input type="text" name="phone_number" class="form-control"
                                value="{{ request.user.phone_number }}">
                        </div>

                        <!-- DOB  -->
                        <div class="mb-3">
                            <label class="form-label text-white-50">Date of Birth</label>
                            {% if pro.date_of_birth %}
                            <input type="date" name="date_of_birth" value="{{pro.date_of_birth|date:'Y-m-d'}}"
                                class="form-control">
                            {% else %}
                            <input type="date" name="date_of_birth" class="form-control">
                            {% endif %}

                        </div>

                        <!-- Gender (Editable Now) -->
                        <div class="mb-3">
                            <label class="form-label text-white-50">Gender</label>
                            <select name="gender" class="form-select">
                                <option value="M" {% if pro.gender == 'M' %} selected {% endif %}>Male</option>
                                <option value="F" {% if pro.gender == 'F' %} selected {% endif %}>Female</option>
                                <option value="O" {% if pro.gender == 'O' or pro.gender is None %} selected {% endif %}>
                                    Other</option>
                            </select>
                        </div>

                        <!-- Profile Image -->
                        <div class="mb-3">
                            <label class="form-label text-white-50">Profile Image</label>
                            <input type="file" name="profile_image" class="form-control">
                        </div>


                        <!-- Buttons -->
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-warning">
                                <i class="fa-solid fa-floppy-disk me-2"></i>Save Changes
                            </button>

                            <a href="{% url 'profile_page' %}" class="btn btn-outline-light">
                                Cancel
                            </a>
                        </div>

                    </form>

                </div>

            </div>
        </div>
    </div>

</body>

</html>
